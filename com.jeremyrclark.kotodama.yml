app-id: com.jeremyrclark.kotodama
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: kotodama
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-documents
modules:
  - name: mecab
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.debian.org/debian/pool/main/m/mecab/mecab_0.996.orig.tar.gz
        sha256: e073325783135b72e666145c781bb48fada583d5224fb2490fb6c1403ba69c59

  - name: kotodama
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DDEV_BUILD=OFF
      - -DBUILD_TESTS=OFF
    post-install:
      - install -Dm644 com.jeremyrclark.kotodama.desktop /app/share/applications/com.jeremyrclark.kotodama.desktop
      - install -Dm644 resources/icons/icon_256x256.png /app/share/icons/hicolor/256x256/apps/com.jeremyrclark.kotodama.png
      - install -Dm644 com.jeremyrclark.kotodama.svg /app/share/icons/hicolor/scalable/apps/com.jeremyrclark.kotodama.svg
    sources:
      - type: dir
        path: .
      # miniz, dropped into the source tree so CMake's vendored-or-fetched
      # logic picks it up without needing network at configure time. Pinned
      # by tag rather than SHA so we don't have to refresh hashes.
      - type: git
        url: https://github.com/richgel999/miniz.git
        tag: 3.0.2
        dest: third_party/miniz
